site_name: Лабораторные работы по веб-программированию
site_url: https://viktoriaskk.github.io/ITMO_ICT_WebDevelopment_tools_2025-2026/
site_description: Документация по лабораторным работам
site_author: Скоблилова Виктория
copyright: Скоблилова Виктория, @viktoriaskk, 2026

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: lime

nav:
  - Лабораторная работа 1: lr1/index.md
  - Лабораторная работа 2: lr2/index.md
  - Лабораторная работа 3: lr3/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - codehilite
  - extra
  - toc:
      permalink: true